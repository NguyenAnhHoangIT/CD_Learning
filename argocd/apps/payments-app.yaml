# ArgoCD App: Deploy payments workload application (Team B)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2" # Deploy after infrastructure is set up
spec:
  project: default
  source:
    repoURL: https://github.com/NguyenAnhHoangIT/CD_Learning.git
    path: apps/payments
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: payments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
