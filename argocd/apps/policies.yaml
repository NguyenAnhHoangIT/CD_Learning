apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3" # Chạy sau policy-controller (-4) để controller sẵn sàng nhận CRD
spec:
  project: default
  source:
    repoURL: 'https://github.com/NguyenAnhHoangIT/CD_Learning.git'
    targetRevision: HEAD
    path: policies
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cosign-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
