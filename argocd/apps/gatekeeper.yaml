apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
  annotations:
    # Đặt sync-wave âm (ví dụ -5) để đảm bảo App này được ArgoCD đồng bộ đầu tiên
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: 'https://open-policy-agent.github.io/gatekeeper/charts'
    targetRevision: 3.14.0
    chart: gatekeeper
    
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Tự động tạo namespace gatekeeper-system nếu chưa có