apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: payments
  name: payments-dev-role
rules:
  # Quyền CRUD trên Pods, Services, ConfigMaps, PVCs (thuộc api group "")
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # Quyền CRUD trên Deployments, StatefulSets, DaemonSets, ReplicaSets (thuộc api group "apps")
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # Quyền CRUD trên Ingresses (thuộc api group "networking.k8s.io")
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # Quyền CRUD trên Argo Rollouts (thuộc api group "argoproj.io")
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-dev-binding
  namespace: payments
subjects:
  - kind: User
    name: payments-dev
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: payments-dev-role
  apiGroup: rbac.authorization.k8s.io
